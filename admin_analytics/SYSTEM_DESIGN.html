<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura System Architecture</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #E8EEF2;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        .canvas-container {
            width: 100%;
            max-width: 1920px;
            aspect-ratio: 16 / 9;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
            background-color: #F4F7F9;
            position: relative;
        }
        svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        .flow-line {
            stroke-dasharray: 12 12;
            animation: flow 1s linear infinite;
        }
        .flow-line-reverse {
            stroke-dasharray: 12 12;
            animation: flow-reverse 1.5s linear infinite;
        }
        @keyframes flow {
            to { stroke-dashoffset: -24; }
        }
        @keyframes flow-reverse {
            to { stroke-dashoffset: 24; }
        }
        .pulse-ring {
            animation: pulse 3s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
            transform-origin: center;
            transform-box: fill-box;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 0.1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
    </style>
</head>
<body>

<div class="canvas-container">
    <svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                <circle cx="2" cy="2" r="1.5" fill="#CBD5E1" />
            </pattern>

            <filter id="glow-core" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="12" result="blur" />
                <feComponentTransfer in="blur" result="glow">
                    <feFuncA type="linear" slope="0.3"/>
                </feComponentTransfer>
                <feComposite in="SourceGraphic" in2="glow" operator="over" />
            </filter>
            <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
                <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#64748B" flood-opacity="0.15"/>
            </filter>

            <linearGradient id="grad-user" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#F0FDFA" />
                <stop offset="100%" stop-color="#CCFBF1" />
            </linearGradient>
            <linearGradient id="grad-core" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#FAF5FF" />
                <stop offset="100%" stop-color="#E9D5FF" />
            </linearGradient>
            <linearGradient id="grad-plan" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#EFF6FF" />
                <stop offset="100%" stop-color="#DBEAFE" />
            </linearGradient>
            <linearGradient id="grad-daily" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#F0F9FF" />
                <stop offset="100%" stop-color="#E0F2FE" />
            </linearGradient>
            <linearGradient id="grad-track" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#FFF7ED" />
                <stop offset="100%" stop-color="#FFEDD5" />
            </linearGradient>
            <linearGradient id="grad-emerg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#FFF1F2" />
                <stop offset="100%" stop-color="#FFE4E6" />
            </linearGradient>
            <linearGradient id="grad-comm" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ECFDF5" />
                <stop offset="100%" stop-color="#D1FAE5" />
            </linearGradient>
            <linearGradient id="grad-reward" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#FFFBEB" />
                <stop offset="100%" stop-color="#FEF3C7" />
            </linearGradient>
            
            <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B82F6" />
            </marker>
            <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#A855F7" />
            </marker>
            <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#0D9488" />
            </marker>
            <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#D97706" />
            </marker>
            <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981" />
            </marker>
        </defs>

        <rect width="1920" height="1080" fill="url(#grid)" />

        <rect x="50" y="100" width="1820" height="930" rx="30" fill="none" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="15 15" />
        <rect x="80" y="80" width="600" height="40" rx="10" fill="#F4F7F9" stroke="#CBD5E1" stroke-width="1.5" />
        <text x="100" y="107" fill="#64748B" font-size="20" font-weight="bold" letter-spacing="2">🛍️ AI-POWERED E-COMMERCE ECOSYSTEM</text>

        <text x="960" y="60" fill="#0F172A" font-size="38" font-weight="900" text-anchor="middle" letter-spacing="1">💎 Aura Intelligence Platform Workflow</text>

        <g id="connections">
            <path d="M 360 490 L 450 490" fill="none" stroke="#0D9488" stroke-width="4" class="flow-line" marker-end="url(#arrow-teal)" />
            <path d="M 730 490 L 820 490" fill="none" stroke="#3B82F6" stroke-width="4" class="flow-line" marker-end="url(#arrow-blue)" />
            <path d="M 1160 490 L 1250 490" fill="none" stroke="#A855F7" stroke-width="4" class="flow-line" marker-end="url(#arrow-purple)" />
            <path d="M 1390 410 C 1390 280, 1450 280, 1560 280" fill="none" stroke="#3B82F6" stroke-width="4" class="flow-line" marker-end="url(#arrow-blue)" />
            <path d="M 1390 570 C 1390 700, 1450 700, 1560 700" fill="none" stroke="#D97706" stroke-width="4" class="flow-line" marker-end="url(#arrow-amber)" />
            <path d="M 1700 360 L 1700 620" fill="none" stroke="#10B981" stroke-width="4" class="flow-line-reverse" marker-end="url(#arrow-green)" />
        </g>

        <g id="labels" font-size="14" font-weight="bold" fill="#334155" text-anchor="middle">
            <rect x="345" y="445" width="120" height="28" rx="14" fill="#F4F7F9" stroke="#14B8A6" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="405" y="464" fill="#0F766E">Raw CSV Events</text>

            <rect x="710" y="445" width="130" height="28" rx="14" fill="#F4F7F9" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="775" y="464" fill="#1D4ED8">Engineered Vectors</text>

            <rect x="1145" y="445" width="130" height="28" rx="14" fill="#F4F7F9" stroke="#A855F7" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="1210" y="464" fill="#6B21A8">Model Predictions</text>

            <rect x="1385" y="255" width="160" height="28" rx="14" fill="#F4F7F9" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="1465" y="274" fill="#1D4ED8">JSON Dashboard API</text>

            <rect x="1395" y="675" width="130" height="28" rx="14" fill="#F4F7F9" stroke="#F59E0B" stroke-width="1.5" filter="url(#shadow)"/>
            <text x="1460" y="694" fill="#B45309">Data Context Sync</text>

            <rect x="1605" y="475" width="190" height="30" rx="15" fill="#F4F7F9" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
            <text x="1700" y="495" fill="#047857" font-size="15">💡 User Query (NLP)</text>
        </g>

        <g class="node" transform="translate(80, 410)" filter="url(#shadow)">
            <rect width="280" height="160" rx="16" fill="url(#grad-user)" stroke="#14B8A6" stroke-width="1.5" />
            <text x="20" y="35" fill="#0F172A" font-size="20" font-weight="bold">📊 1. Data Generation</text>
            <line x1="20" y1="50" x2="260" y2="50" stroke="#0F766E" stroke-opacity="0.2" stroke-width="2" />
            <text x="20" y="75" fill="#475569" font-size="15">• 5,000 Synthetic Users</text>
            <text x="20" y="95" fill="#475569" font-size="15">• 50 Luxury Jewelry Products</text>
            <text x="20" y="115" fill="#475569" font-size="15">• 150k+ Simulated Events</text>
            <rect x="15" y="130" width="250" height="26" rx="6" fill="#FFFFFF" fill-opacity="0.7" />
            <text x="25" y="148" fill="#0D9488" font-size="14" font-weight="bold">👉 Output: events.csv & catalog</text>
        </g>

        <g class="node" transform="translate(450, 410)" filter="url(#shadow)">
            <rect width="280" height="160" rx="16" fill="url(#grad-plan)" stroke="#3B82F6" stroke-width="1.5" />
            <text x="20" y="35" fill="#1E3A8A" font-size="20" font-weight="bold">⚙️ 2. Feature Engineering</text>
            <line x1="20" y1="50" x2="260" y2="50" stroke="#1D4ED8" stroke-opacity="0.2" stroke-width="2" />
            <text x="20" y="75" fill="#334155" font-size="15">• Extract Session-level Metrics</text>
            <text x="20" y="95" fill="#334155" font-size="15">• Flag 3D & Try-on Interaction</text>
            <text x="20" y="115" fill="#334155" font-size="15">• Map Pricing & Categories</text>
            <rect x="15" y="130" width="250" height="26" rx="6" fill="#FFFFFF" fill-opacity="0.7" />
            <text x="25" y="148" fill="#2563EB" font-size="14" font-weight="bold">👉 Output: ML-Ready Features</text>
        </g>

        <circle cx="990" cy="490" r="130" fill="none" stroke="#D8B4FE" stroke-width="3" class="pulse-ring" />
        <circle cx="990" cy="490" r="160" fill="none" stroke="#E9D5FF" stroke-width="2" class="pulse-ring" style="animation-delay: 1.5s;" />
        
        <g class="node" transform="translate(820, 390)" filter="url(#glow-core)">
            <rect width="340" height="200" rx="20" fill="url(#grad-core)" stroke="#A855F7" stroke-width="2.5" />
            <text x="25" y="35" fill="#4C1D95" font-size="22" font-weight="900">🧠 3. Machine Learning Pipeline</text>
            <text x="25" y="55" fill="#7E22CE" font-size="14" font-style="italic">(HistGradientBoosting Classifier)</text>
            <line x1="25" y1="70" x2="315" y2="70" stroke="#7E22CE" stroke-opacity="0.2" stroke-width="2" />
            
            <text x="25" y="95" fill="#581C87" font-size="15" font-weight="bold">Core Model Insights Generated:</text>
            <text x="25" y="115" fill="#4C1D95" font-size="14">🎯 Predicts Purchase Intent (89% Acc)</text>
            <text x="25" y="135" fill="#4C1D95" font-size="14">📊 Feature Imp: Try-on (45%), 3D (25%)</text>
            <text x="25" y="155" fill="#4C1D95" font-size="14">🚀 Identifies +4.5x AR Conversion Lift</text>
            
            <rect x="20" y="165" width="300" height="26" rx="8" fill="#FFFFFF" fill-opacity="0.8" />
            <text x="35" y="183" fill="#7E22CE" font-size="14" font-weight="bold">👉 Output: Purchase Probability Matrix</text>
        </g>

        <g class="node" transform="translate(1250, 410)" filter="url(#shadow)">
            <rect width="280" height="160" rx="16" fill="url(#grad-daily)" stroke="#0EA5E9" stroke-width="1.5" />
            <text x="20" y="35" fill="#0C4A6E" font-size="20" font-weight="bold">🌐 4. Aggregation API</text>
            <line x1="20" y1="50" x2="260" y2="50" stroke="#0284C7" stroke-opacity="0.2" stroke-width="2" />
            <text x="20" y="75" fill="#475569" font-size="15">• Node/Express.js Backend</text>
            <text x="20" y="95" fill="#475569" font-size="15">• Aggregate Predictions & KPIs</text>
            <text x="20" y="115" fill="#475569" font-size="15">• Calculate Inventory Demand</text>
            <rect x="15" y="130" width="250" height="26" rx="6" fill="#FFFFFF" fill-opacity="0.7" />
            <text x="25" y="148" fill="#0284C7" font-size="14" font-weight="bold">👉 Output: Unified REST Endpoints</text>
        </g>

        <g class="node" transform="translate(1560, 200)" filter="url(#shadow)">
            <rect width="280" height="160" rx="16" fill="url(#grad-comm)" stroke="#10B981" stroke-width="1.5" />
            <text x="20" y="35" fill="#064E3B" font-size="20" font-weight="bold">📈 5. React Dashboard</text>
            <line x1="20" y1="50" x2="260" y2="50" stroke="#047857" stroke-opacity="0.2" stroke-width="2" />
            <text x="20" y="75" fill="#475569" font-size="15">• Interactive Recharts Visuals</text>
            <text x="20" y="95" fill="#475569" font-size="15">• 9 Distinct Analytics Views</text>
            <text x="20" y="115" fill="#475569" font-size="15">• Executive KPIs & Alerts</text>
            <rect x="15" y="130" width="250" height="26" rx="6" fill="#FFFFFF" fill-opacity="0.7" />
            <text x="25" y="148" fill="#059669" font-size="14" font-weight="bold">👉 Output: Visual Intelligence</text>
        </g>

        <g class="node" transform="translate(1560, 620)" filter="url(#shadow)">
            <rect width="280" height="160" rx="16" fill="url(#grad-reward)" stroke="#F59E0B" stroke-width="1.5" />
            <text x="20" y="35" fill="#78350F" font-size="20" font-weight="bold">🤖 6. Aura AI Copilot</text>
            <line x1="20" y1="50" x2="260" y2="50" stroke="#B45309" stroke-opacity="0.2" stroke-width="2" />
            <text x="20" y="75" fill="#475569" font-size="15">• Google GenAI Integration</text>
            <text x="20" y="95" fill="#475569" font-size="15">• Reads Dashboard Context</text>
            <text x="20" y="115" fill="#475569" font-size="15">• Translates Data to Insights</text>
            <rect x="15" y="130" width="250" height="26" rx="6" fill="#FFFFFF" fill-opacity="0.7" />
            <text x="25" y="148" fill="#D97706" font-size="14" font-weight="bold">👉 Output: Chat-Based Answers</text>
        </g>

    </svg>
</div>

</body>
</html>
